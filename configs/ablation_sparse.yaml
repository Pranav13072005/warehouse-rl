env:
  grid_size: 5
  max_swaps_per_order: 10
  n_skus: 20
  orders_per_episode: 50
  reward_mode: sparse
ppo:
  batch_size: 64
  clip_range: 0.2
  ent_coef: 0.01
  gae_lambda: 0.95
  gamma: 0.99
  learning_rate: 0.0003
  max_grad_norm: 0.5
  n_epochs: 10
  n_steps: 2048
  policy: MlpPolicy
  total_timesteps: 500000
  vf_coef: 0.5
training:
  eval_freq: 10000
  log_dir: ./runs/
  model_dir: ./models/
  n_eval_episodes: 20
  run_name: ppo_sparse
